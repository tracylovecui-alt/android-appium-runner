<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Appium Runner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel panel-form">
        <div class="hero">
          <p class="eyebrow">Windows Desktop Runner</p>
          <h1>Android App 自动化执行器</h1>
          <p class="subtitle">
            用桌面界面管理 APK、连接参数和动作脚本，再交给 Appium 自动执行。
          </p>
          <div class="toolbar">
            <button id="check-system" type="button" class="secondary">检查环境</button>
            <button id="detect-activity" type="button" class="secondary">获取当前 Activity</button>
            <button id="import-config" type="button" class="secondary">导入配置</button>
            <button id="export-config" type="button" class="secondary">导出配置</button>
            <button id="reset-config" type="button" class="secondary">恢复默认</button>
          </div>
        </div>

        <form id="config-form">
          <section class="card">
            <h2>基础配置</h2>

            <label>
              <span>APK 路径</span>
              <div class="row">
                <input id="apkPath" name="apkPath" type="text" />
                <button id="pick-apk" type="button" class="secondary">选择 APK</button>
              </div>
            </label>

            <div class="grid two">
              <label>
                <span>App Package</span>
                <input id="appPackage" name="appPackage" type="text" />
              </label>
              <label>
                <span>App Activity</span>
                <input id="appActivity" name="appActivity" type="text" />
              </label>
            </div>

            <div class="grid three">
              <label>
                <span>Appium Host</span>
                <input id="appiumHost" name="appiumHost" type="text" />
              </label>
              <label>
                <span>Appium Port</span>
                <input id="appiumPort" name="appiumPort" type="number" />
              </label>
              <label>
                <span>Appium Path</span>
                <input id="appiumPath" name="appiumPath" type="text" />
              </label>
            </div>

            <div class="grid three">
              <label>
                <span>Device Name</span>
                <input id="deviceName" name="deviceName" type="text" />
              </label>
              <label>
                <span>启动等待(ms)</span>
                <input id="postLaunchWaitMs" name="postLaunchWaitMs" type="number" />
              </label>
              <label>
                <span>结束等待(ms)</span>
                <input id="finalWaitMs" name="finalWaitMs" type="number" />
              </label>
              <label>
                <span>最终截图名</span>
                <input id="screenshotLabel" name="screenshotLabel" type="text" />
              </label>
            </div>

            <div class="checks">
              <label class="checkbox">
                <input id="noReset" name="noReset" type="checkbox" />
                <span>保留 App 状态</span>
              </label>
              <label class="checkbox">
                <input id="autoGrantPermissions" name="autoGrantPermissions" type="checkbox" />
                <span>自动授予权限</span>
              </label>
            </div>
          </section>

          <section class="card">
            <div class="section-head">
              <h2>动作流程</h2>
              <div class="button-group">
                <button id="add-action" type="button" class="secondary">添加动作</button>
                <button id="add-basic-flow" type="button" class="secondary">测试流程</button>
                <button id="use-example" type="button" class="secondary">登录示例</button>
              </div>
            </div>
            <p class="hint">
              先用简单模式添加动作；需要精细调整时再打开高级 JSON。
            </p>
            <div id="action-builder" class="action-builder"></div>

            <details class="advanced-json">
              <summary>高级 JSON</summary>
              <textarea id="actions" name="actions" spellcheck="false"></textarea>
            </details>
          </section>

          <section class="card action-bar">
            <button id="save-config" type="button" class="secondary">保存本地配置</button>
            <button id="run-button" type="submit" class="primary">开始执行</button>
          </section>
        </form>
      </aside>

      <main class="panel panel-log">
        <section class="card status-card">
          <div class="section-head">
            <h2>环境状态</h2>
            <button id="open-artifacts" type="button" class="secondary">打开截图目录</button>
          </div>
          <div id="status-list" class="status-list">
            <div class="empty-state">还没有检查环境</div>
          </div>
        </section>

        <section class="card log-card">
          <div class="section-head">
            <h2>运行日志</h2>
            <div class="button-group">
              <button id="copy-log" type="button" class="secondary">复制日志</button>
              <button id="clear-log" type="button" class="secondary">清空日志</button>
            </div>
          </div>
          <pre id="log-output"></pre>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
